<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <dialog class="new-project">
        <h1>New Project</h1>
        <input class="project-title" type="text" required>
        <button class="project-create">Create</button>
        <p>Press [ESC] to cancel.</p>
    </dialog>

    <dialog class="new-todo">
        <h1>New Todo</h1>
        <input id="todo-title" type="text" required>
        <textarea id="todo-desc" placeholder="Description (optional)"></textarea>
        <input type="date" id="todo-dueDate">
        <select id="todo-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <button class="todo-create">Create</button>
        <p>Press [ESC] to cancel.</p>
    </dialog>

    <button class="add-project">+</button>
    <div class="project-list">

    </div>
</body>
</html>
