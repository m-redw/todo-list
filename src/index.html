<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <dialog id="edit-todo">
        <input type="text" placeholder="Title" required>
        <textarea placeholder="Insert description"></textarea>
        <input type="date">
        <div>
            <button class="checkbox"></button>
            <span>Complete</span>
        </div>
        <button class="dialog-exit">Save and Exit</button>
    </dialog>

    <button class="add-project">+</button>
    <div class="project-list">
        <div class="project">
            <div class="content-container">
                <h1>Project 1</h1>

                <h2>Heading 1</h2>

                <div class="todo">
                    <div>
                        <button class="checkbox"></button>
                        <span class="title">Todooooooooooooooooooooooo 1</span>
                        <span class="desc">[...]</span>
                    </div>
                    <p class="due">Due in 3 days</p>                        
                    <button class="edit-todo">Edit</button>
                    <button class="delete-todo">x</button>
                </div>
            </div>

            <button class="add-more">+</button>
        </div>
    </div>
</body>
</html>
